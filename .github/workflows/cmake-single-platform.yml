# This starter workflow is for a CMake project running on a single platform. There is a different starter workflow if you need cross-platform coverage.
# See: https://github.com/actions/starter-workflows/blob/main/ci/cmake-multi-platform.yml
name: CMake on a single platform

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

env:
  # Customize the CMake build type here (Release, Debug, RelWithDebInfo, etc.)
  BUILD_TYPE: Release

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Build Compiler
      run: |
          sudo apt-get install help2man
          sudo apt-get install libtool-bin
          sudo apt-get install libelf-dev
          pip install config


          pwd
          dir
          cmake tools/translator/

          echo -- tree --
          tree /home/runner/work/cibyl/cibyl/tools/translator/
          echo -- tree --

#          cd toolchain
#          make #
#          export PATH=$PATH:/home/runner/work/cibyl/cibyl/toolchain/x-tools/mips-cibyl-elf/bin
#          alias mips-cibyl-elf-gcc=/home/runner/work/cibyl/cibyl/toolchain/x-tools/mips-cibyl-elf/bin
#          sudo find / -type d -name "xcibyl-translator"
#          echo -- tree --
#          tree /home/runner/work/cibyl/
#          echo -- tree --
          

#    - name: Build translator and the cibyl libraries
#      run: |
#          pip install config
#          cd /home/runner/work/cibyl/cibyl/
#          pwd
#          dir
#          cd build
#          cmake ../

    - name: Upload Builds
      uses: actions/upload-artifact@v4
      with:
        name: cibyl for linux
        path: /home/runner/work/cibyl/cibyl/toolchain/mips-cibyl-elf.tar.bz2

    - name: Create Release
      id: create_release
      uses: actions/create-release@v1
      env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }} # This token is provided by Actions, you do not need to create your own token
      with:
          tag_name: v${{ github.run_number }}
          release_name: 'Release v${{ github.run_number }}'
          body: 'Cibyl CI Release'
          draft: false
          prerelease: false

    - name: Upload Release Asset
      id: upload-release-asset 
      uses: actions/upload-release-asset@v1
      env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
          upload_url: ${{ steps.create_release.outputs.upload_url }} # This pulls from the CREATE RELEASE step above, referencing it's ID to get its outputs object, which include a `upload_url`. See this blog post for more info: https://jasonet.co/posts/new-features-of-github-actions/#passing-data-to-future-steps 
          asset_path: /home/runner/work/cibyl/cibyl/toolchain/mips-cibyl-elf.tar.bz2
          asset_name: mips-cibyl-elf.tar.bz2
          asset_content_type: application/x-bzip2
